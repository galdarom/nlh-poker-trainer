<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>NLH Trainer — Stacks & All-ins</title>
<style>
  :root { --felt:#0b6b3a; --felt-dark:#084d2a; --gold:#e8c66b; }
  * { box-sizing: border-box; }
  html, body { overflow-x:hidden; max-width:100%; }
  body { margin:0; font-family: system-ui, Arial, sans-serif; background:#13241b; color:#f4f4f4; }
  h1 { text-align:center; font-weight:600; margin:10px 0; font-size:19px; }
  .session { text-align:center; font-size:14px; margin:2px 0 8px; }
  .session .net.pos { color:#9be59b; } .session .net.neg { color:#f39b9b; }
  /* tablewrap scales the fixed-size felt down to fit narrow (phone) screens; JS sets the scale. */
  .tablewrap { width:100%; overflow:hidden; margin:12px 0; }
  .table { position:relative; width:720px; height:420px; transform-origin:top left;
    background:radial-gradient(ellipse at center, var(--felt), var(--felt-dark));
    border:10px solid #5a3a1a; border-radius:210px; box-shadow:0 0 40px rgba(0,0,0,.5) inset; }
  .center { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; }
  .street { font-size:12px; color:#cdeccd; letter-spacing:1px; text-transform:uppercase; }
  .pot { font-size:18px; color:#fff; margin:4px 0; font-weight:700; text-shadow:0 1px 3px #000; }
  .pot .tocall { font-size:12px; color:#ffd9a0; font-weight:600; }

  .betchip { position:absolute; transform:translate(-50%,-50%); z-index:6; white-space:nowrap;

  .matrixbox .legend2 { font-size:11px; color:#cfe6d6; margin:6px 0 0; max-width:352px; }
  .closebtn { margin-top:10px; }

  .typebtn.active { background:#3a8f5a; color:#fff; border-color:#5fd089; }
  /* Phone: shrink the range matrix overlay + buttons/chrome so it's compact, not oversized. */
  @media (max-width: 560px) {

    .summarybox { max-width:94vw; padding:10px 12px; }

</style>

  <script>
// UMD-style module: works in Node (module.exports) and browser (window.Engine).
(function (root, factory) {
  const api = factory();
  if (typeof module === 'object' && module.exports) module.exports = api;
  else root.Engine = api;
})(typeof self !== 'undefined' ? self : this, function () {
  const RANKS = ['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
  const SUITS = ['c','d','h','s'];

  function rankValue(rank) {
    const i = RANKS.indexOf(rank);
    if (i < 0) throw new Error('bad rank: ' + rank);
    return i + 2;
  }

  function createDeck() {
    const deck = [];
    for (const rank of RANKS) for (const suit of SUITS) deck.push({ rank, suit });
    return deck;
  }

  // Fisher-Yates. rng() must return [0,1). Defaults to Math.random.
  function shuffle(deck, rng) {
    rng = rng || Math.random;
    const a = deck.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Deal 2 hole cards to each of `numSeats` seats from the top of the deck.
  function dealHands(deck, numSeats) {
    if (numSeats * 2 > deck.length) throw new Error('not enough cards to deal');
    const seats = [];
    let idx = 0;
    for (let s = 0; s < numSeats; s++) {
      seats.push([deck[idx++], deck[idx++]]);
    }
    return seats;
  }

  // Normalized key like 'AA', 'AKs', 'AKo', '72o'. High card first.
  function canonicalKey(c1, c2) {
    let hi = c1, lo = c2;
    if (rankValue(c2.rank) > rankValue(c1.rank)) { hi = c2; lo = c1; }
    if (hi.rank === lo.rank) return hi.rank + lo.rank; // pair
    const suited = hi.suit === lo.suit ? 's' : 'o';
    return hi.rank + lo.rank + suited;
  }

  // All 169 canonical starting hands with metadata.
  function enumerateStartingHands() {
    const hands = [];
    for (let i = RANKS.length - 1; i >= 0; i--) {
      for (let j = RANKS.length - 1; j >= 0; j--) {
        const hi = RANKS[i], lo = RANKS[j];
        if (i === j) {
          hands.push({ key: hi + lo, hi, lo, type: 'pair' });
        } else if (i > j) {
          // suited and offsuit, high rank first
          hands.push({ key: hi + lo + 's', hi, lo, type: 'suited' });
          hands.push({ key: hi + lo + 'o', hi, lo, type: 'offsuit' });
        }
      }
    }
    return hands;
  }

  // Chen formula. Returns { score (number), factors }.
  function heuristicScore(c1, c2) {
    const hiCard = rankValue(c1.rank) >= rankValue(c2.rank) ? c1 : c2;
    const loCard = hiCard === c1 ? c2 : c1;
    const hiVal = rankValue(hiCard.rank);
    const loVal = rankValue(loCard.rank);
    const isPair = hiVal === loVal;
    const isSuited = c1.suit === c2.suit;

    // Base points from the highest card.
    function highPoints(val) {
      if (val === 14) return 10;     // Ace
      if (val === 13) return 8;      // King
      if (val === 12) return 7;      // Queen
      if (val === 11) return 6;      // Jack
      return val / 2;                // T down to 2
    }

    let score;
    if (isPair) {
      score = Math.max(highPoints(hiVal) * 2, 5); // pairs: double, min 5
    } else {
      score = highPoints(hiVal);
      if (isSuited) score += 2;
      const gap = hiVal - loVal - 1; // 0 = connectors
      if (gap === 1) score -= 1;
      else if (gap === 2) score -= 2;
      else if (gap === 3) score -= 4;
      else if (gap >= 4) score -= 5;
      // Straight bonus: 0/1-gap hands with both cards below Q.
      if (gap <= 1 && hiVal < 12) score += 1;
    }
    score = Math.round(score * 2) / 2; // round to nearest half-point

    const gap = isPair ? 0 : (hiVal - loVal - 1);
    return {
      score,
      factors: {
        isPair, isSuited, gap,
        hi: hiCard.rank, lo: loCard.rank,
        highCard: hiVal >= 12, // Q or better
      },
    };
  }

  let _strengthTable = null; // Map<key, {score1to10, heuristic, rank}>

  function buildStrengthTable() {
    if (_strengthTable) return _strengthTable;
    const hands = enumerateStartingHands().map(h => {
      // Build a representative card pair for scoring this canonical hand.
      const c1 = { rank: h.hi, suit: 'c' };
      const c2 = { rank: h.lo, suit: (h.type === 'suited' ? 'c' : 'd') };
      const hs = heuristicScore(c1, c2).score;
      return { key: h.key, heuristic: hs };
    });
    // Sort strongest first.
    hands.sort((a, b) => b.heuristic - a.heuristic);
    const n = hands.length; // 169
    const table = new Map();
    hands.forEach((h, i) => {
      const rank = i + 1; // 1 = strongest (AA) ... n = weakest (72o)
      // i=0 (strongest) -> 10, i=n-1 (weakest) -> 1. (coarse bucket, UNCHANGED)
      const score1to10 = Math.max(1, Math.min(10, Math.ceil(((n - i) / n) * 10)));
      // fine display value: rank 1 -> 100, rank n -> 1, strictly monotonic by rank.
      const score100 = Math.round(1 + ((n - rank) / (n - 1)) * 99);
      table.set(h.key, { score: score1to10, score100, heuristic: h.heuristic, rank });
    });
    _strengthTable = table;
    return table;
  }

  function rawScore(c1, c2) {
    const table = buildStrengthTable();
    const key = canonicalKey(c1, c2);
    const entry = table.get(key);
    const factors = heuristicScore(c1, c2).factors;
    return { score: entry.score, score100: entry.score100, heuristic: entry.heuristic, rank: entry.rank, key, factors };
  }

  const ACTION_ORDER = ['UTG','MP','HJ','CO','BTN','SB','BB'];
  // Clockwise from the button.
  const CLOCKWISE_FROM_BUTTON = ['BTN','SB','BB','UTG','MP','HJ','CO'];
  const POSITIONS = ACTION_ORDER;

  function positionForSeat(seat, buttonSeat, numSeats) {
    const offset = ((seat - buttonSeat) % numSeats + numSeats) % numSeats;
    return CLOCKWISE_FROM_BUTTON[offset];
  }

  function seatsWithPositions(numSeats, buttonSeat) {
    const seats = [];
    for (let s = 0; s < numSeats; s++) {
      seats.push({ seat: s, position: positionForSeat(s, buttonSeat, numSeats) });
    }
    return seats;
  }

  // Positional adjustment applied to the raw 1-10 score.
  const POSITION_ADJUST = {
    UTG: -2, MP: -1, HJ: 0, CO: +1, BTN: +2, SB: -1, BB: -1,
  };

  function clampScore(n) {
    return Math.max(1, Math.min(10, Math.round(n)));
  }

  function positionScore(rawScoreValue, position) {
    const adj = POSITION_ADJUST[position];
    if (adj === undefined) throw new Error('bad position: ' + position);
    const score = clampScore(rawScoreValue + adj);
    let reason;
    if (adj > 0) reason = `${position} is a late position — play it stronger (+${adj}).`;
    else if (adj < 0) reason = `${position} is an early/blind position — play tighter (${adj}).`;
    else reason = `${position} is a middle position — no change.`;
    return { score, reason, adjustment: adj };
  }

  // Minimum 1-10 bucket to OPEN (no prior raise), by position.
  const OPEN_THRESHOLD = { UTG: 8, MP: 7, HJ: 6, CO: 5, BTN: 4, SB: 5, BB: 4 };
  // Minimum bucket to CONTINUE when facing a raise.
  const CONTINUE_THRESHOLD = 8;
  // state: { raised: boolean }. Returns 'fold' | 'call' | 'raise'.
  function decideAction(bucket, position, state) {
    if (state && state.raised) {
      if (bucket >= CONTINUE_THRESHOLD + 1) return 'raise'; // 3-bet the very top
      if (bucket >= CONTINUE_THRESHOLD) return 'call';
      return 'fold';
    }
    const open = OPEN_THRESHOLD[position];
    if (bucket < open) return 'fold';
    return 'raise'; // v1: opening hands always raise (no limping AI)
  }

  // opts: { heroSeat, buttonSeat, numSeats, bucketForSeat(seat) -> 1..10 }
  // Returns { actions: [{seat, position, action}], raisedBefore, callersBefore, foldedToHero }
  function runActionUntilHero(opts) {
    const { heroSeat, buttonSeat, numSeats, bucketForSeat } = opts;
    // Map position label -> seat for this button.
    const seatOf = {};
    for (let s = 0; s < numSeats; s++) {
      seatOf[positionForSeat(s, buttonSeat, numSeats)] = s;
    }
    const heroPosition = positionForSeat(heroSeat, buttonSeat, numSeats);
    const actions = [];
    let raisedBefore = false;
    let callersBefore = 0;
    for (const pos of ACTION_ORDER) {
      const seat = seatOf[pos];
      if (seat === heroSeat) break; // stop at hero
      const action = decideAction(bucketForSeat(seat), pos, { raised: raisedBefore });
      actions.push({ seat, position: pos, action });
      if (action === 'raise') raisedBefore = true;
      else if (action === 'call') callersBefore += 1;
    }
    const foldedToHero = actions.length > 0 && actions.every(a => a.action === 'fold');
    return { actions, raisedBefore, callersBefore, foldedToHero, heroPosition };
  }

  // base = position-adjusted 1-10 score. summary from runActionUntilHero.
  function postActionScore(base, summary) {
    let delta = 0;
    let reason;
    if (summary.raisedBefore) {
      delta = -2;
      reason = 'A player raised before you — your hand is relatively weaker against a raising range (-2).';
    } else if (summary.foldedToHero) {
      delta = +1;
      reason = 'Folded to you — you can play more aggressively / open for a steal (+1).';
    } else if (summary.callersBefore > 0) {
      delta = -1;
      reason = `${summary.callersBefore} caller(s) before you — multiway pots favor stronger hands (-1).`;
    } else {
      delta = 0;
      reason = 'No action of note before you.';
    }
    return { score: clampScore(base + delta), reason, adjustment: delta };
  }

  const SUIT_SYMBOL = { c: '♣', d: '♦', h: '♥', s: '♠' };

  function suitSymbol(suit) { return SUIT_SYMBOL[suit]; }
  function suitColor(suit) { return (suit === 'h' || suit === 'd') ? 'red' : 'black'; }
  function cardLabel(card) { return card.rank + SUIT_SYMBOL[card.suit]; }
  // Array of 10 booleans; first `n` are true.
  function scoreBar(n) {
    return Array.from({ length: 10 }, (_, i) => i < n);
  }

  return { RANKS, SUITS, rankValue, createDeck, shuffle, dealHands,
           canonicalKey, enumerateStartingHands, heuristicScore,
           buildStrengthTable, rawScore,
           ACTION_ORDER, POSITIONS, positionForSeat, seatsWithPositions,
           clampScore, positionScore,
           decideAction, runActionUntilHero, postActionScore,
           suitSymbol, suitColor, cardLabel, scoreBar };
});

</script>

  // Highest card of the best straight in `values`, or 0. Handles the wheel.

      } else {

  // evaluate 5-7 cards -> { category, categoryRank, value, ranks }
  function evaluate(cards) {
    const vals = cards.map(c => rankValue(c.rank));
    const valsDesc = vals.slice().sort((a, b) => b - a);

    const rankCount = {};

    // closes (if top == second, excess is 0, no-op).
    function applyUncalledRefund() {
      const seats2 = Object.keys(totalCommitted).map(Number).filter(s => totalCommitted[s] > 0);
      if (seats2.length < 2) {
        // Only one contributor: nothing to refund (edge case: heads-up preflop fold).
        return;
      }
      const sorted = seats2.slice().sort((a, b) => totalCommitted[b] - totalCommitted[a]);
      const top = sorted[0], second = sorted[1];
      const excess = totalCommitted[top] - totalCommitted[second];
      if (excess > 0) {
        totalCommitted[top] -= excess;
        refunds[top] = (refunds[top] || 0) + excess;
      }
    }

    function dealNextStreet() {
      streetIndex += 1;
      if (streetIndex === 1) board = flopCards.slice();
      else if (streetIndex === 2) board = flopCards.concat([turnCard]);
      else if (streetIndex === 3) board = flopCards.concat([turnCard, riverCard]);
    }

    // (e) Side-pot showdown via SidePots.buildPots + awardPots.
    function goShowdown() {
      const entries = liveSeats.map(seat => ({ seat, cards: hands[seat].concat(board) }));
      const evals = {};
      for (const e of entries) evals[e.seat] = Evaluator.evaluate(e.cards);
      const pots = SidePots.buildPots(totalCommitted, liveSeats);
      const { payouts: pay, breakdown, undistributed } = SidePots.awardPots(pots, evals, buttonSeat, numSeats);
      if (undistributed !== 0) {
        throw new Error('chip conservation violation: undistributed=' + undistributed + ' (refund logic bug)');
      }
      finalPayouts = Object.assign({}, refunds);
      for (const s of Object.keys(pay)) finalPayouts[Number(s)] = (finalPayouts[Number(s)] || 0) + pay[s];
      const headline = breakdown.length ? breakdown[0].winners : liveSeats;
      const potTotal = pots.reduce((a, p) => a + p.amount, 0);
      result = { pots, payouts: finalPayouts, breakdown, winners: headline,
                 pot: potTotal,   // v3 compatibility: total pot at showdown
                 board: board.slice(), byFold: false,
                 reason: `${headline.map(posOf).join(', ')} win${headline.length > 1 ? ' (split)' : 's'} at showdown` };
      terminal = true; streetIndex = 99; // showdown marker
    }

    // (f) Fold-win: pay the whole post-refund pot to the survivor.
    function foldWin() {
      applyUncalledRefund();
      const seat = liveSeats[0];
      const potTotal = Object.values(totalCommitted).reduce((a, b) => a + b, 0);
      finalPayouts = Object.assign({}, refunds);
      finalPayouts[seat] = (finalPayouts[seat] || 0) + potTotal;
      result = { pots: [{ amount: potTotal, eligibleSeats: [seat] }], payouts: finalPayouts,
                 breakdown: [{ amount: potTotal, winners: [seat] }], winners: [seat],
                 pot: potTotal,   // v3 compatibility
                 board: board.slice(), byFold: true, reason: `${posOf(seat)} wins (everyone folded)` };
      terminal = true; streetIndex = 99;
    }

    // Advance through streets until awaiting the hero or terminal.
    function progress() {
      while (true) {
        if (round.awaitingHero()) return;
        if (!round.state().complete) return; // shouldn't happen (auto-advanced), safety
        absorbRound();
        if (streetIndex === 0) preflopAggressor = round.state().lastAggressorSeat; // 3C: capture preflop raiser
        // (c) Apply uncalled-bet refund after each round closes.
        applyUncalledRefund();
        if (liveSeats.length <= 1) { foldWin(); return; }
        // (d) All-in run-out: if <2 players can still act, deal all remaining streets then showdown.
        const canStillAct = liveSeats.filter(s => remainingStack(s) == null || remainingStack(s) > 0);
        if (liveSeats.length >= 2 && canStillAct.length < 2) {
          while (streetIndex < 3) { dealNextStreet(); }
          goShowdown();
          return;
        }
        if (streetIndex >= 3) { goShowdown(); return; }
        dealNextStreet();
        round = makeRound('postflop', liveSeats, round.state().pot);
      }
    }

    // Kick off preflop.
    round = makeRound('preflop', liveSeats, 0);
    progress();

    function streetName() {
      if (terminal) return 'complete';
      return STREETS[streetIndex] || 'showdown';
    }

    return {
      street: streetName,
      board: () => board.slice(),
      result: () => result,
      awaitingHero: () => !terminal && round.awaitingHero(),
      legalHeroOptions: () => round.legalHeroOptions(),
      act: (action, opts) => { round.act(action, opts); progress(); },
      // (g) Expose payouts() and contributions() for chip conservation.
      payouts: () => Object.assign({}, finalPayouts),
      contributions: () => Object.assign({}, grossCommitted),
      state: () => {
        const st = round.state();
        return {
          street: streetName(), board: board.slice(), pot: st.pot,
          currentBet: st.currentBet, raisesSoFar: st.raisesSoFar,
          awaitingHero: !terminal && round.awaitingHero(),
          toAct: st.toAct, result,
          players: seats.map(s => {
            const rp = st.players.find(p => p.seat === s.seat);
            return {
              seat: s.seat, position: s.position, type: s.type,
              status: liveSeats.includes(s.seat) ? (rp ? rp.status : 'active') : 'folded',
              lastAction: rp ? rp.lastAction : null,
              committed: rp ? rp.committed : 0,
              totalCommitted: totalCommitted[s.seat],
              stack: rp ? rp.stack : 0,
              allIn: rp ? rp.allIn : false,
            };
          }),
        };
      },
      _debug: { hands: () => hands },
    };
  }

  return { createHand };
});

</script>
  <script>
    const E = window.Engine, P = window.Players, PF = window.Postflop, EV = window.Evaluator,
          C = window.Coach, HF = window.HandFlow, ST = window.Stacks, R = window.Ranges;
    if (!E || !P || !PF || !EV || !C || !HF || !ST || !R) {
      document.body.innerHTML = '<h1>NLH Trainer</h1><p style="text-align:center;max-width:600px;margin:20px auto">' +
        'Could not load modules. Keep this file next to the <code>src</code> folder, or open the <code>dist/</code> build.</p>';
      throw new Error('modules not loaded');
    }

    const NUM_SEATS = 7, HERO_SEAT = 0, SB = 5, BB = 5;
    const SEAT_XY = [[360,372],[150,330],[70,190],[210,64],[510,64],[650,190],[570,330]];

    let session = ST.createSession({ numSeats: NUM_SEATS, heroSeat: HERO_SEAT, bigBlind: BB, minBB: 100, maxBB: 100 });
    session.assignAll();
    let seatTypes = {};
    function assignSeatTypes() {
      seatTypes = {};
      for (let s = 0; s < NUM_SEATS; s++) seatTypes[s] = s === HERO_SEAT ? null : P.randomType();
    }
    assignSeatTypes();
    let buttonSeat = 6;
    let heroType = 'TAG';
    // Coaching language ('en' | 'he'); affects ONLY the coaching panel + feedback banner.
    let lang = 'en';
    try { if (localStorage.getItem('nlh-lang') === 'he') lang = 'he'; } catch (e) {}
    let decisionStats = { total: 0, optimal: 0, A: 0, B: 0, C: 0, F: 0, loose: 0, tight: 0 };
    function resetStats() { decisionStats = { total: 0, optimal: 0, A: 0, B: 0, C: 0, F: 0, loose: 0, tight: 0 }; }
    let lastDecision = null;
    let hand = null, hero = null, revealed = new Set(), settled = false, rebuysToShow = [];

    function posOf(seat) { return E.seatsWithPositions(NUM_SEATS, buttonSeat).find(s => s.seat === seat).position; }
    function bb(amount) { return Math.round(amount / BB) + 'bb'; }
    // Format a 1-100 fine score as one-decimal X.X (e.g. 100 -> "10.0", 83 -> "8.3").
    function fmt10(score100) { return (score100 / 10).toFixed(1); }

    function deal() {
      buttonSeat = (buttonSeat + 1) % NUM_SEATS;
      const seats = E.seatsWithPositions(NUM_SEATS, buttonSeat)
        .map(s => ({ ...s, type: s.seat === HERO_SEAT ? null : seatTypes[s.seat] }));
      const stacks = session.stacks();
      hand = HF.createHand({ seats, heroSeat: HERO_SEAT, buttonSeat, numSeats: NUM_SEATS,
        smallBlind: SB, bigBlind: BB, stacks });
      hero = hand._debug.hands()[HERO_SEAT];
      revealed = new Set(); settled = false;
      setFeedback('', ''); document.getElementById('result').textContent = '';
      closeOverlay();
      render();
    }

    // New Game: fresh session (new stacks + bankroll $0), new opponents, random button.
    function newGame() {
      session = ST.createSession({ numSeats: NUM_SEATS, heroSeat: HERO_SEAT, bigBlind: BB, minBB: 100, maxBB: 100 });
      session.assignAll();
      assignSeatTypes();
      resetStats(); lastDecision = null;
      buttonSeat = Math.floor(Math.random() * NUM_SEATS); // deal() advances it
      deal();
    }

    function settleIfDone() {
      if (settled) return;
      const res = hand.result();
      if (!res) return;
      session.applyResult(hand.payouts(), hand.contributions());
      rebuysToShow = session.lastRebuys();
      settled = true;
    }

    function render() {
      const st = hand.state();
      const board = hand.board();
      settleIfDone();
      const table = document.getElementById('table');
      table.innerHTML = '';

      // session header
      const net = session.heroNet();
      document.getElementById('session').innerHTML =
        `Session: <span class="net ${net >= 0 ? 'pos' : 'neg'}">${net >= 0 ? '+' : ''}$${net}</span>` +
        ` · your stack $${session.stacks()[HERO_SEAT]} (${bb(session.stacks()[HERO_SEAT])})`;

      const center = document.createElement('div');
      center.className = 'center';
      const boardHtml = board.map(c =>
        `<div class="card ${E.suitColor(c.suit) === 'red' ? 'red' : ''}">${E.cardLabel(c)}</div>`).join('')
        || '<span style="color:#cdeccd;font-size:12px">(preflop)</span>';
      const res = hand.result();
      const heroCommitted = (st.players.find(p => p.seat === HERO_SEAT) || {}).committed || 0;
      const toCall = Math.max(0, st.currentBet - heroCommitted);
      let potLine = `🟡 Pot $${st.pot}` +
        (toCall > 0 ? ` <span class="tocall">· $${toCall} to call</span>` : '');
      if (res && res.pots && res.pots.length > 1) {
        potLine = res.pots.map((p, i) => (i === 0 ? 'Main $' : 'Side $') + p.amount).join(' · ');
      }
      center.innerHTML = `<div class="street">${st.street}</div>
        <div class="pot">${potLine}</div><div class="board">${boardHtml}</div>`;
      table.appendChild(center);

      // Bet chips: each player's chips committed THIS street, shown in front of them toward the pot.
      // (Hidden once the hand is settled / at showdown, since chips have moved to the pot.)
      const TABLE_CX = 360, TABLE_CY = 210; // center of the 720x420 table
      if (!settled) {
        for (let s = 0; s < NUM_SEATS; s++) {
          const pl = st.players.find(p => p.seat === s);
          if (!pl || !pl.committed || pl.status === 'folded') continue;
          const [sx, sy] = SEAT_XY[s];
          // place the chip ~38% of the way from the seat toward the table center
          const cx = sx + (TABLE_CX - sx) * 0.38;
          const cy = sy + (TABLE_CY - sy) * 0.38;
          const chip = document.createElement('div');
          chip.className = 'betchip' + (pl.allIn ? ' allin' : '');
          chip.style.left = cx + 'px';
          chip.style.top = cy + 'px';
          chip.textContent = (pl.allIn ? '🔴 ' : '🪙 ') + '$' + pl.committed;
          table.appendChild(chip);
        }
      }

      const winners = res ? res.winners : [];
      const texture = board.length ? PF.boardTexture(board) : null;
      const liveStacks = session.stacks();

      for (let s = 0; s < NUM_SEATS; s++) {
        const info = E.seatsWithPositions(NUM_SEATS, buttonSeat).find(x => x.seat === s);
        const pl = st.players.find(p => p.seat === s);
        const isHero = s === HERO_SEAT;
        const showFace = isHero || (res && pl.status !== 'folded' && st.street === 'complete');
        const cards = hand._debug.hands()[s];

        const div = document.createElement('div');
        div.className = 'seat' + (isHero ? ' hero' : '') + (pl.status === 'folded' ? ' folded' : '')
          + (pl.allIn ? ' allin' : '') + (winners.includes(s) ? ' winner' : '');
        div.style.left = SEAT_XY[s][0] + 'px';
        div.style.top = SEAT_XY[s][1] + 'px';

        const cardHtml = showFace
          ? cards.map(c => `<div class="card ${E.suitColor(c.suit) === 'red' ? 'red' : ''}">${E.cardLabel(c)}</div>`).join('')
          : '<div class="card back">x</div><div class="card back">x</div>';

        let posText = info.position + (isHero ? ' (you)' : '');
        if (info.position === 'BTN') posText = '🔘 ' + posText;
        const typeText = isHero ? '' : ` <span class="type">${pl.type}</span>`;

        // stack line: during the hand show the round's remaining stack; after settle show session stack
        const shownStack = settled ? liveStacks[s] : pl.stack;
        const stackLine = `<div class="stack">$${shownStack} (${bb(shownStack)})${pl.allIn ? ' · ALL-IN' : ''}</div>`;
        const rebuyLine = (settled && rebuysToShow.includes(s)) ? '<div class="rebuy">💰 rebought</div>' : '';

        let badge;
        if (isHero) {
          const liveLabel = board.length
            ? fmt10(PF.postflopScore(cards, board).score100) + '/10'
            : fmt10(E.rawScore(cards[0], cards[1]).score100) + '/10';
          badge = `<span class="score live">live ${liveLabel}</span>`;
        } else {
          const la = pl.lastAction;
          if (la && la !== 'fold') {
            const read = board.length
              ? P.perceivedRead(P.PROFILES[pl.type], la === 'all-in' ? 'raise' : la, st.raisesSoFar, { street: st.street, texture })
              : P.perceivedRead(P.PROFILES[pl.type], la === 'all-in' ? 'raise' : la, st.raisesSoFar);
            badge = read.score == null ? '<span class="score folded">folded</span>'
              : `<span class="score read">read ${read.score}/10</span>`;
          } else if (pl.status === 'folded') {
            badge = '<span class="score folded">folded</span>';
          } else { badge = '<span class="score read">read –</span>'; }
          if (showFace && !isHero) {
            const trueLabel = board.length
              ? fmt10(PF.postflopScore(cards, board).score100) + '/10'
              : fmt10(E.rawScore(cards[0], cards[1]).score100) + '/10';
            const ev = EV.evaluate(cards.concat(board));
            badge += ` <span class="score true">true ${trueLabel}${board.length ? ' (' + ev.category + ')' : ''}</span>`;
          }
        }

        // Action word only; the dollar amount lives on the bet chip in front of the seat.
        const last = pl.lastAction ? `<div class="act">${pl.lastAction}</div>` : '';
        div.innerHTML = `<div class="pos">${posText}${typeText}</div>${stackLine}
          <div class="cards">${cardHtml}</div><div class="badge">${badge}</div>${last}${rebuyLine}`;
        if (!isHero) { div.style.cursor = 'pointer'; div.addEventListener('click', () => { showOpponentRange(s); }); }
        table.appendChild(div);
      }

      renderControls();
      renderResult();
      renderHeroInfo();
      renderHeroTypeSelector();
      renderLangSelector();
      fitTable();
      renderSummary();
    }

    // Scale the fixed 720x420 felt down to fit the viewport width (phones); never scale up past 1.
    function fitTable() {
      const wrap = document.getElementById('tablewrap');
      const t = document.getElementById('table');
      if (!wrap || !t) return;
      const TW = 740, TH = 440; // table size including its 10px border
      // Base on the true visual viewport (window.innerWidth); clientWidth can inflate with overflow.
      const vw = window.innerWidth || document.documentElement.clientWidth || TW;
      const avail = Math.min(wrap.clientWidth || vw, vw) - 6;
      const scale = Math.min(1, avail / TW);
      t.style.transform = 'scale(' + scale + ')';
      t.style.marginLeft = Math.max(0, (avail - TW * scale) / 2) + 'px';
      wrap.style.height = (TH * scale) + 'px';
    }
    window.addEventListener('resize', fitTable);

    function renderHeroTypeSelector() {
      const host = document.getElementById('heroTypeSel');
      if (!host) return;
      host.innerHTML = '';
      for (const t of P.TYPES) {
        const b = document.createElement('button');
        b.className = 'typebtn' + (t === heroType ? ' active' : '');
        b.textContent = t;
        b.addEventListener('click', () => { heroType = t; render(); });
        host.appendChild(b);
      }
    }

    function renderLangSelector() {
      const host = document.getElementById('langSel');
      if (!host) return;
      host.innerHTML = '';
      [['en', 'EN'], ['he', 'עברית']].forEach(([code, label]) => {
        const b = document.createElement('button');
        b.className = 'typebtn' + (code === lang ? ' active' : '');
        b.textContent = label;
        b.addEventListener('click', () => {
          lang = code;
          try { localStorage.setItem('nlh-lang', code); } catch (e) {}
          // Re-render the LAST decision in the new language from its stored inputs (no state change,
          // no stat change — verdict/grade are language-neutral and already counted).
          if (lastDecision && lastDecision._action) {
            lastDecision = buildDecision(lastDecision._action, lastDecision._cards, lastDecision._board, lastDecision._faced);
            setFeedback(lastDecision.short, lastDecision.verdict);
          }
          render();
        });
        host.appendChild(b);
      });
    }

    function toggle(seat) { if (revealed.has(seat)) revealed.delete(seat); else revealed.add(seat); render(); }

    function closeOverlay() { const o = document.getElementById('rangeOverlay'); if (o) o.remove(); }

    // Render a 13x13 range matrix overlay for a given range result {keyToAction, meta}.
    // If `cards` is provided (only at hand end), also show the opponent's actual hole cards.
    function showRangeMatrix(range, cards) {
      closeOverlay();
      const overlay = document.createElement('div');
      overlay.id = 'rangeOverlay';
      overlay.className = 'overlay';
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });

      const box = document.createElement('div');
      box.className = 'matrixbox';
      const legend = '<span class="legend">'
        + '<b style="background:#d8643c"></b>raise/3-bet'
        + '<b style="background:#3c79d8"></b>call/limp'
        + '<b style="background:#33402f"></b>fold</span>';
      const cardsHtml = cards
        ? '<div class="revealcards">Actual hand: '
          + cards.map(c => `<div class="card ${E.suitColor(c.suit) === 'red' ? 'red' : ''}">${E.cardLabel(c)}</div>`).join('')
          + '</div>'
        : '';
      box.innerHTML = '<h3>' + range.meta.label + '</h3>' + cardsHtml + legend;

      const ACTION_COLORS = { raise: '#d8643c', call: '#3c79d8', fold: '#33402f' };
      const grid = document.createElement('div');
      grid.className = 'grid13';
      let anyMixed = false;
      for (let i = 0; i < 13; i++) {
        for (let j = 0; j < 13; j++) {
          const cell = R.GRID[i][j];
          const action = range.keyToAction[cell.key];
          const mix = range.keyToMix && range.keyToMix[cell.key];
          const isMixed = mix && Math.max(mix.raise, mix.call, mix.fold) < 1 - 1e-9;
          const d = document.createElement('div');
          if (isMixed) {
            anyMixed = true;
            const rPct = Math.round(mix.raise * 100);
            const cPct = Math.round((mix.raise + mix.call) * 100);
            d.className = 'gcell mixed';
            d.style.background = 'linear-gradient(135deg, '
              + ACTION_COLORS.raise + ' 0 ' + rPct + '%, '
              + ACTION_COLORS.call + ' ' + rPct + '% ' + cPct + '%, '
              + ACTION_COLORS.fold + ' ' + cPct + '% 100%)';
            d.textContent = cell.key;
            const badge = document.createElement('span');
            badge.className = 'mixpct';
            badge.textContent = Math.round(mix[action] * 100) + '%';
            d.appendChild(badge);
          } else {
            d.className = 'gcell ' + action;
            d.textContent = cell.key;
          }
          grid.appendChild(d);
        }
      }
      box.appendChild(grid);
      if (anyMixed) {
        const note = document.createElement('div');
        note.className = 'legend2';
        note.textContent = 'Split cells = mixed frequency (raise → call → fold along the diagonal); % = the most-likely action.';
        box.appendChild(note);
      }

      const close = document.createElement('button');
      close.className = 'closebtn'; close.textContent = 'Close';
      close.addEventListener('click', closeOverlay);
      box.appendChild(close);

      overlay.appendChild(box);
      document.body.appendChild(overlay);
    }

    // Opponent click -> show THEIR range from type+position+latest preflop action context.
    function showOpponentRange(seat) {
      const st = hand.state();
      const info = E.seatsWithPositions(NUM_SEATS, buttonSeat).find(x => x.seat === seat);
      // find this seat's latest preflop log entry for raisesBefore (default 0 if none yet)
      let raisesBefore = 0;
      const log = st.log || (st.players && st.players.log) || [];
      // handflow state() does not expose the round log directly; use raisesSoFar as the live ctx
      raisesBefore = st.raisesSoFar || 0;
      const pl = st.players.find(p => p.seat === seat);
      const range = R.rangeFor(pl.type, info.position, { raisesBefore });
      // Only at hand end (showdown/complete) also reveal their actual cards.
      const res = hand.result();
      const cards = (res && st.street === 'complete') ? hand._debug.hands()[seat] : null;
      showRangeMatrix(range, cards);
    }

    function renderControls() {
      const box = document.getElementById('controls');
      box.innerHTML = '';
      if (!hand.awaitingHero()) return;
      const opt = hand.legalHeroOptions();
      const st = hand.state();
      const pot = st.pot;
      const heroPl = st.players.find(p => p.seat === HERO_SEAT);
      const myStack = heroPl.stack;
      const mk = (label, fn, cls) => {
        const b = document.createElement('button'); b.textContent = label;
        if (cls) b.className = cls; b.addEventListener('click', fn); box.appendChild(b);
      };
      mk('Fold', () => act('fold'), 'secondary');
      if (opt.canCheck) mk('Check', () => act('check'));
      if (opt.canCall) mk('Call $' + opt.callAmount, () => act('call'));
      // pot-fraction sizing (bet or raise), each clamped to stack; collapse to All-in if >= stack
      const facingBet = !opt.canCheck && opt.canCall;
      const sizes = [['½ pot', 0.5], ['¾ pot', 0.75], ['pot', 1]];
      const allInTotal = opt.allInAmount;
      if (opt.canBet || opt.canRaise) {
        for (const [lbl, frac] of sizes) {
          const target = Math.round((facingBet ? (opt.callAmount + Math.round(frac * (pot + opt.callAmount))) : Math.round(frac * pot)));
          const toAmount = Math.min(Math.max(target, (opt.raiseToAmount || opt.betAmount || BB)), allInTotal);
          if (toAmount >= allInTotal) continue; // collapses into All-in button
          const action = opt.canBet ? 'bet' : 'raise';
          mk((opt.canBet ? 'Bet ' : 'Raise ') + lbl + ' ($' + toAmount + ')', () => act(action, { toAmount }));
        }
      }
      if (opt.canAllIn) mk('All-in $' + allInTotal, () => act('allin'), 'danger');
    }

    // Compute a coaching decision in the current language and stash its raw inputs so the
    // language toggle can re-render the SAME spot without replaying game state.
    function buildDecision(action, cards, board, faced) {
      const d = C.coachTip(action, cards, board, faced, heroType, lang);
      d._action = action; d._cards = cards; d._board = board; d._faced = faced;
      return d;
    }

    function act(action, opts) {
      const st = hand.state();
      const board = hand.board();
      const heroCommitted = (st.players.find(p => p.seat === HERO_SEAT) || {}).committed || 0;
      // Normalize the action to fold|check|call|bet|raise for the range-aware coach.
      const aNorm = action === 'allin'
        ? (board.length ? (st.currentBet > heroCommitted ? 'raise' : 'bet') : 'raise')
        : action;
      // Compute the tip on the state the hero FACED (before applying the action).
      const tState = Object.assign({}, st, { heroSeat: HERO_SEAT });
      const fb = buildDecision(aNorm, hero, board, tState);
      decisionStats.total += 1;
      if (fb.optimal) decisionStats.optimal += 1;
      if (decisionStats[fb.grade] != null) decisionStats[fb.grade] += 1;
      if (fb.verdict === 'loose') decisionStats.loose += 1;
      else if (fb.verdict === 'tight') decisionStats.tight += 1;
      lastDecision = fb;
      hand.act(action, opts);
      setFeedback(fb.short, fb.verdict);
      render();
    }

    function renderResult() {
      const res = hand.result();
      if (!res) { document.getElementById('result').textContent = ''; return; }
      let txt = `🏆 ${res.reason}`;
      if (res.breakdown && res.breakdown.length > 1) {
        txt += ' — ' + res.breakdown.map((b, i) =>
          `${i === 0 ? 'main' : 'side'} $${b.amount} → ${b.winners.map(posOf).join('/')}`).join(', ');
      } else {
        const total = res.pots ? res.pots.reduce((a, p) => a + p.amount, 0) : 0;
        txt += ` — pot $${total}`;
      }
      document.getElementById('result').textContent = txt;
    }

    function renderHeroInfo() {
      const board = hand.board();
      if (board.length) {
        const r = PF.postflopScore(hero, board);
        document.getElementById('heroInfo').innerHTML =
          `Your hand: <b>${r.made}</b> — <b>${fmt10(r.score100)}/10</b><br><span class="reason">${r.reason}</span>`;
      } else {
        const raw = E.rawScore(hero[0], hero[1]);
        document.getElementById('heroInfo').innerHTML =
          `Your hand <b>${raw.key}</b> — <b>${fmt10(raw.score100)}/10</b> <span class="reason">(rank #${raw.rank} of 169)</span>`;
      }
    }

    function setFeedback(text, verdict) {
      const el = document.getElementById('feedback');
      el.textContent = text || '';
      el.className = 'feedback' + (verdict ? ' ' + verdict : '') + (lang === 'he' ? ' rtl' : '');
      el.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }
    function summaryTakeaway(d) {
      if (lang === 'he') {
        if (d.total < 3) return 'שחק עוד כמה ידיים לקבלת תמונה.';
        if (d.loose - d.tight >= 2) return 'אתה משחק רחב מדי — קפל יותר בלי המחיר.';
        if (d.tight - d.loose >= 2) return 'אתה מקפל יותר מדי — המשך רחב יותר כשיש לך את הסיכויים.';
        return 'מאוזן יפה — כל הכבוד.';
      }
      if (d.total < 3) return 'Play a few more hands for a read.';
      if (d.loose - d.tight >= 2) return "You're playing too loose — fold more without the price.";
      if (d.tight - d.loose >= 2) return "You're over-folding — continue wider when you have the odds.";
      return 'Nicely balanced — keep it up.';
    }
    // Persistent coaching + session panel at the page bottom (a prominent rectangle, always visible).
    function renderSummary() {
      const box = document.getElementById('summaryBox');
      if (!box) return;
      const he = lang === 'he';
      box.className = 'summarybox' + (he ? ' rtl' : '');
      box.setAttribute('dir', he ? 'rtl' : 'ltr');
      const d = decisionStats;
      const net = session.heroNet();
      const acc = d.total ? Math.round(100 * d.optimal / d.total) : 0;
      const L = he
        ? { title: 'אימון ומשחק', net: 'נטו', dec: 'החלטות', opt: 'אופטימלי', grades: 'ציונים',
            placeholder: 'קבל החלטה — האימון המלא והנתונים יופיעו כאן.' }
        : { title: 'Coaching &amp; session', net: 'Net', dec: 'Decisions', opt: 'Optimal', grades: 'Grades',
            placeholder: 'Make a decision — your full coaching and session stats appear here.' };
      const stats = L.net + ' <span class="net ' + (net >= 0 ? 'pos' : 'neg') + '">' + (net >= 0 ? '+' : '') + '$' + net + '</span>'
        + ' · ' + L.dec + ' ' + d.total + ' · ' + L.opt + ' ' + d.optimal + ' (' + acc + '%)'
        + ' · ' + L.grades + ' A ' + d.A + ' · B ' + d.B + ' · C ' + d.C + ' · F ' + d.F;
      let html = '<div class="sb-title">' + L.title + '</div>';
      if (lastDecision) {
        html += '<div class="sb-decision ' + (lastDecision.verdict || '') + '">' + escapeHtml(lastDecision.text) + '</div>';
        if (lastDecision.analysis)
          html += '<div class="sb-analysis">' + escapeHtml(lastDecision.analysis) + '</div>';
        if (lastDecision.ev)
          html += '<div class="sb-ev">' + escapeHtml(lastDecision.ev) + '</div>';
        html += '<div class="sb-rule">💡 ' + escapeHtml(lastDecision.rule) + '</div>';
      } else {
        html += '<div class="sb-decision">' + L.placeholder + '</div>';
      }
      html += '<div class="sb-stats">' + stats + '</div>';
      if (d.total > 0) html += '<div class="sb-tip">💡 ' + escapeHtml(summaryTakeaway(d)) + '</div>';
      box.innerHTML = html;
    }

    document.getElementById('dealBtn').addEventListener('click', deal);
    document.getElementById('newGameBtn').addEventListener('click', newGame);
    document.getElementById('myRangeBtn').addEventListener('click', function () {
      const st = hand.state();
      const heroPos = posOf(HERO_SEAT);
      showRangeMatrix(R.heroRepresentedRange(heroPos, { raisesBefore: st.raisesSoFar || 0 }, heroType));
    });
    deal();
  </script>
</body>
</html>
