<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NLH Trainer — Stacks & All-ins</title>
<style>
  :root { --felt:#0b6b3a; --felt-dark:#084d2a; --gold:#e8c66b; }
  * { box-sizing: border-box; }
  html, body { overflow-x:hidden; max-width:100%; }
  body { margin:0; font-family: system-ui, Arial, sans-serif; background:#13241b; color:#f4f4f4; }
  h1 { text-align:center; font-weight:600; margin:10px 0; font-size:19px; }
  .session { text-align:center; font-size:14px; margin:2px 0 8px; }
  .session .net.pos { color:#9be59b; } .session .net.neg { color:#f39b9b; }
  /* tablewrap scales the fixed-size felt down to fit narrow (phone) screens; JS sets the scale. */
  .tablewrap { width:100%; overflow:hidden; margin:12px 0; }
  .table { position:relative; width:720px; height:420px; transform-origin:top left;
    background:radial-gradient(ellipse at center, var(--felt), var(--felt-dark));
    border:10px solid #5a3a1a; border-radius:210px; box-shadow:0 0 40px rgba(0,0,0,.5) inset; }
  .center { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; }
  .street { font-size:12px; color:#cdeccd; letter-spacing:1px; text-transform:uppercase; }
  .pot { font-size:22px; color:#fff; margin:4px 0; font-weight:700; text-shadow:0 1px 3px #000; }
  .pot .tocall { font-size:12px; color:#ffd9a0; font-weight:600; }
  /* chips a player has wagered this street, shown in front of them toward the pot */
  .betchip { position:absolute; transform:translate(-50%,-50%); z-index:6; white-space:nowrap;
    background:#16110a; color:var(--gold); border:1.5px solid var(--gold); border-radius:12px;
    padding:2px 8px; font-size:12px; font-weight:700; box-shadow:0 1px 4px rgba(0,0,0,.55); }
  .betchip.allin { color:#ffb3b3; border-color:#ffb3b3; }
  .board { display:flex; gap:5px; justify-content:center; min-height:50px; }
  .seat { position:absolute; width:118px; text-align:center; transform:translate(-50%,-50%); }
  .seat .pos { font-size:12px; color:var(--gold); }
  .seat .type { background:#2f5740; color:#fff; border-radius:4px; padding:0 4px; font-size:10px; }
  .seat .stack { font-size:11px; color:#d8f0e2; }
  .seat.hero .pos { color:#fff; font-weight:700; }
  .seat.folded { opacity:.4; }
  .seat.allin .stack { color:#ffb3b3; font-weight:700; }
  .seat.winner .pos { color:#9be59b; font-weight:700; }
  .seat .rebuy { font-size:10px; color:var(--gold); }
  .cards { display:flex; gap:4px; justify-content:center; margin-top:2px; }
  .card { width:30px; height:43px; background:#fff; border-radius:5px; color:#111;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .card.red { color:#c0202a; }
  .card.back { background:linear-gradient(135deg,#274b8f,#16294f); color:transparent; }
  /* Community (board) cards are 25% larger than seat cards for readability. */
  .board .card { width:38px; height:54px; font-size:20px; }
  .badge { margin-top:3px; min-height:15px; }
  .score { font-size:11px; border-radius:4px; padding:1px 5px; }
  .score.live { background:var(--gold); color:#222; font-weight:700; }
  .score.read { background:#23415c; color:#cfe6ff; }
  .score.true { background:#5c2342; color:#ffd6ec; }
  .score.folded { background:#444; color:#ccc; }
  /* Each player's last action — a prominent, color-coded pill (raise/call/fold etc.). */
  .act { font-size:13px; font-weight:800; color:#fff; margin-top:4px; text-transform:uppercase;
    letter-spacing:.3px; display:inline-block; padding:2px 9px; border-radius:11px;
    background:rgba(0,0,0,.4); box-shadow:0 1px 4px rgba(0,0,0,.45); }
  .act.fold  { background:#7a2b3c; }
  .act.check { background:#3a5a45; }
  .act.call  { background:#2f5fa8; }
  .act.raise { background:#d8643c; }
  .act.allin { background:#a8324a; box-shadow:0 0 9px #ff7b7b; }
  .controls { text-align:center; margin:8px 0; min-height:42px; }
  button { background:var(--gold); color:#222; border:none; padding:9px 14px; font-size:14px;
    font-weight:700; border-radius:8px; cursor:pointer; margin:0 3px; }
  button.secondary { background:#2f5740; color:#fff; }
  button.danger { background:#a8324a; color:#fff; }
  .feedback { text-align:center; min-height:20px; font-size:14px; margin:6px auto; max-width:640px; }
  .feedback.good { color:#9be59b; } .feedback.loose { color:#f3c969; } .feedback.tight { color:#f39b9b; }
  .feedback .fbmeta { font-size:12px; color:#9fc6e0; margin-top:3px; }
  .result { text-align:center; font-size:15px; color:#fff; margin:6px auto; min-height:20px; }
  .heroInfo { text-align:center; font-size:13px; color:#e8f3ec; margin:6px auto; max-width:640px; }
  .heroInfo .reason { font-size:12px; color:#bcd; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex;
    align-items:center; justify-content:center; z-index:50; }
  .matrixbox { background:#16241c; border:1px solid #2f5740; border-radius:10px; padding:14px 16px;
    box-shadow:0 8px 30px rgba(0,0,0,.6); }
  .matrixbox h3 { margin:0 0 4px; font-size:14px; color:#fff; }
  /* persistent coaching + session rectangle at the page bottom */
  .summarybox { max-width:640px; margin:14px auto 6px; padding:12px 16px; text-align:left;
    background:#16241c; border:1px solid #3a6b4c; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.4); }
  .summarybox .sb-title { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#7fae90; margin-bottom:6px; }
  .summarybox .sb-decision { font-size:15px; line-height:1.45; color:#e8f3ec; }
  .summarybox .sb-decision.good { color:#9be59b; } .summarybox .sb-decision.loose { color:#f3c969; } .summarybox .sb-decision.tight { color:#f39b9b; }
  .summarybox .sb-analysis { font-size:13px; color:#bcd2c4; margin-top:5px; }
  .summarybox .sb-ev { font-size:13px; color:#a9c6d8; margin-top:5px; }
  .summarybox .sb-rule { font-size:13px; color:#9fc6e0; margin-top:5px; }
  .summarybox .sb-stats { font-size:13px; color:#cfe6d6; margin-top:9px; padding-top:9px; border-top:1px solid #29402f; }
  .summarybox .sb-stats .net.pos { color:#9be59b; } .summarybox .sb-stats .net.neg { color:#f39b9b; }
  .summarybox .sb-tip { font-size:13px; color:#ffd9a0; margin-top:5px; }
  .summarybox.rtl { direction:rtl; text-align:right; }
  .feedback.rtl { direction:rtl; }
  .matrixbox .revealcards { display:flex; gap:5px; align-items:center; margin:4px 0 8px; font-size:12px; color:#ffd6ec; }
  .matrixbox .revealcards .card { width:30px; height:43px; }
  .matrixbox .legend { font-size:11px; color:#cfe6d6; margin:2px 0 10px; }
  .matrixbox .legend b { display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:middle; margin:0 3px 0 8px; }
  .grid13 { display:grid; grid-template-columns:repeat(13, 26px); grid-auto-rows:26px; gap:1px; }
  .gcell { font-size:9px; display:flex; align-items:center; justify-content:center; color:#0c140f;
    border-radius:2px; user-select:none; }
  .gcell.raise { background:#d8643c; color:#fff; }   /* red = raise/3-bet */
  .gcell.call  { background:#3c79d8; color:#fff; }   /* blue = call/limp */
  .gcell.fold  { background:#33402f; color:#7e927e; } /* grey = fold */
  .gcell.mixed { position:relative; color:#fff; text-shadow:0 1px 1px rgba(0,0,0,.7); }
  .gcell.mixed .mixpct { position:absolute; bottom:0; right:1px; font-size:6px; line-height:1; opacity:.9; }
  .matrixbox .legend2 { font-size:11px; color:#cfe6d6; margin:6px 0 0; max-width:352px; }
  .closebtn { margin-top:10px; }
  .version { text-align:center; font-size:11px; color:#5a6b5f; margin:16px 0 24px; letter-spacing:1px; }
  .setuplabel { font-size:13px; color:#cdeccd; margin-right:4px; }
  #setupRow .sep { color:#5a6; margin:0 6px; }
  .typebtn { padding:4px 9px; margin:0 2px; font-size:12px; border-radius:6px; border:1px solid #3a5; background:#1d2b22; color:#cfe6d6; cursor:pointer; }
  .typebtn.active { background:#3a8f5a; color:#fff; border-color:#5fd089; }
  .guide-btn { padding:4px 10px; margin:0 2px; font-size:12px; border-radius:6px; border:1px solid #3a5; background:#1d2b22; color:#5fd089; cursor:pointer; text-decoration:none; display:inline-block; }
  /* Hand-trainer drill header + lesson panel */
  .drillbar { text-align:center; font-size:13px; color:var(--gold); font-weight:600; margin:4px auto 0; max-width:640px; letter-spacing:.3px; }
  .drillbar:empty { display:none; }
  .summarybox .sb-lesson { background:#15251b; border:1px solid #3a6b4c; border-left:3px solid var(--gold);
    border-radius:8px; padding:9px 12px; margin-bottom:11px; }
  .summarybox.rtl .sb-lesson { border-left:1px solid #3a6b4c; border-right:3px solid var(--gold); }
  .summarybox .sb-lesson .lesson-head { font-size:14px; color:var(--gold); font-weight:700; }
  .summarybox .sb-lesson .lesson-act { font-size:13px; color:#9be59b; font-weight:700; margin-top:3px; }
  .summarybox .sb-lesson .lesson-why { font-size:13px; color:#cfe6d6; margin-top:3px; line-height:1.45; }
  /* --- Opponent action animation --- */
  /* Glow ring on the seat that is acting right now. */
  .seat.acting { animation: seatpulse 1.05s ease-out; }
  @keyframes seatpulse {
    0%   { filter: drop-shadow(0 0 0 rgba(232,198,107,0)); }
    25%  { filter: drop-shadow(0 0 12px rgba(232,198,107,.95)); }
    100% { filter: drop-shadow(0 0 0 rgba(232,198,107,0)); }
  }
  /* Floating action label that pops above the acting seat. */
  .actionpop { position:absolute; left:50%; top:-16px; transform:translateX(-50%); z-index:9;
    padding:3px 10px; border-radius:13px; font-size:13px; font-weight:800; letter-spacing:.4px;
    white-space:nowrap; color:#fff; box-shadow:0 2px 9px rgba(0,0,0,.6); animation: poplabel .55s ease-out; }
  .actionpop.fold  { background:#7a2b3c; }
  .actionpop.check { background:#3a5a45; }
  .actionpop.call  { background:#2f5fa8; }
  .actionpop.raise { background:#d8643c; }
  .actionpop.allin { background:#a8324a; box-shadow:0 0 12px #ff7b7b; }
  @keyframes poplabel {
    0%   { opacity:0; transform:translateX(-50%) translateY(9px) scale(.7); }
    40%  { opacity:1; transform:translateX(-50%) translateY(0) scale(1.1); }
    100% { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
  }
  /* A chip token that glides from the acting seat toward the pot. */
  .flychip { position:absolute; transform:translate(-50%,-50%); z-index:7; font-size:17px;
    pointer-events:none; animation: flytopot .5s ease-in forwards; }
  @keyframes flytopot {
    from { transform:translate(-50%,-50%); opacity:1; }
    to   { transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))); opacity:.2; }
  }
  /* Newly dealt board cards flip in. */
  .card.dealing { animation: dealin .45s ease-out; }
  @keyframes dealin {
    0%   { transform:rotateY(90deg) scale(.6); opacity:0; }
    60%  { transform:rotateY(0deg) scale(1.06); opacity:1; }
    100% { transform:none; }
  }
  /* Subtle "opponents acting" hint under the table. */
  .actinghint { text-align:center; font-size:12px; color:#cdeccd; min-height:16px; letter-spacing:.5px; opacity:.85; }
  /* Phone: shrink the range matrix overlay + buttons/chrome so it's compact, not oversized. */
  @media (max-width: 560px) {
    h1 { font-size:15px; margin:6px 8px; }
    .session { font-size:12px; }
    .matrixbox { max-width:96vw; padding:10px 8px; }
    .grid13 { grid-template-columns:repeat(13, 1fr); grid-auto-rows:6.6vw; width:100%; }
    .gcell { font-size:2.4vw; }
    .matrixbox h3 { font-size:12px; }
    .matrixbox .legend, .matrixbox .legend2 { font-size:10px; }
    .card { width:40px; height:57px; font-size:21px; } /* 33% bigger on mobile for readability */
    .board .card { width:50px; height:71px; font-size:26px; } /* community cards +25% on mobile too */
    /* Hero's own hole cards: +50% over the others so you can read your hand at a glance. */
    .seat.hero { width:150px; }
    .seat.hero .card { width:60px; height:85px; font-size:31px; }
    /* +50% on the per-seat labels and the bet-amount chips for readability on the scaled table */
    .seat .pos { font-size:18px; }
    .seat .type { font-size:15px; }
    .seat .stack { font-size:16px; }
    .seat .rebuy { font-size:15px; }
    .score { font-size:16px; }
    .act { font-size:17px; padding:2px 11px; }
    .betchip { font-size:18px; }
    .pot .tocall { font-size:18px; }
    .controls { margin:5px 0; min-height:0; }
    button { padding:6px 9px; font-size:11.5px; margin:2px; border-radius:6px; }
    .typebtn { padding:3px 7px; font-size:11px; margin:1px; }
    .feedback { font-size:12px; }
    .summarybox { max-width:94vw; padding:10px 12px; }
    .summarybox .sb-decision { font-size:13px; }
    .summarybox .sb-analysis, .summarybox .sb-ev, .summarybox .sb-rule, .summarybox .sb-stats, .summarybox .sb-tip { font-size:12px; }
    .heroInfo { font-size:12px; }
    .setuplabel { display:block; width:100%; margin:0 0 3px; font-size:12px; }
  }
</style>

<body>
  <h1>NLH Trainer — Stacks · All-ins · Side Pots</h1>
  <div class="session" id="session"></div>
  <div id="drillBar" class="drillbar"></div>
  <div class="tablewrap" id="tablewrap"><div class="table" id="table"></div></div>
  <div id="actingHint" class="actinghint"></div>
  <div id="controls" class="controls"></div>
  <div id="feedback" class="feedback"></div>
  <div id="result" class="result"></div>
  <div id="heroInfo" class="heroInfo"></div>
  <div class="controls" id="setupRow">
    <span class="setuplabel">You play as:</span>
    <span id="heroTypeSel"></span>
    <span class="sep">·</span>
    <button id="myRangeBtn" class="secondary">My range</button>
    <button id="dealBtn" class="secondary">Deal new hand</button>
    <button id="newGameBtn" class="secondary">New Game</button>
    <span class="sep">·</span>
    <button id="trainerBtn" class="secondary">🎓 Learn AK</button>
  </div>
  <div class="controls" id="langRow">
    <span class="setuplabel">Coaching language:</span>
    <span id="langSel"></span>
    <span class="sep">·</span>
    <a href="guide-he.html" class="guide-btn">📖 מדריך</a>
  </div>
  <div id="summaryBox" class="summarybox"></div>
  <div class="version">V1.25</div>
